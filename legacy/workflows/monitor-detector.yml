name: MELI Monitor Mejorado (Cada Hora)

on:
  schedule:
    - cron: '0 * * * *'  # Cada hora, en punto
  workflow_dispatch:    # Manual si es necesario

jobs:
  monitor_y_detector:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias npm
        run: npm install

      - name: Ejecutar monitor.js
        id: monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SCRAPFLY_KEY: ${{ secrets.SCRAPFLY_KEY }}
        run: |
          mkdir -p output
          node monitor.js 2>&1 | tee output/monitor.log
          echo "✅ Monitor ejecutado"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: |
          pip install supabase --break-system-packages

      - name: Ejecutar detector_bajas.py
        id: detector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 detector_bajas.py 2>&1 | tee output/detector.log
          echo "✅ Detector ejecutado"

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: monitor output [skip ci]" && git push)

      - name: Guardar logs como artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs-${{ github.run_number }}
          path: output/
          retention-days: 30

      - name: Notificar si hay errores
        if: failure()
        run: |
          echo "❌ ALERTA: El workflow falló"
          echo "Revisar logs en: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

