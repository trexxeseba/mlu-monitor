name: MLU Monitor Pipeline

# Uruguay = UTC-3
# 09:00 UY (12:00 UTC) — scraping todos los sellers
# 14:00 UY (17:00 UTC) — scraping todos los sellers
# 19:00 UY (22:00 UTC) — email resumen del día
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'scrape o email'
        required: false
        default: 'scrape'

  schedule:
    - cron: '0 12 * * *'   # scrape — 09:00 UY
    - cron: '0 17 * * *'   # scrape — 14:00 UY
    - cron: '0 22 * * *'   # email  — 19:00 UY

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB A: SCRAPING (todos los sellers)
  # ════════════════════════════════════════════════════════════════════════════
  scrape:
    name: "Scrape todos los sellers"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: |
      (github.event_name == 'schedule' && github.event.schedule != '0 22 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode != 'email')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: "1/3 — Monitor (scraping)"
        id: monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OXYLABS_USER: ${{ secrets.OXYLABS_USER }}
          OXYLABS_PASS: ${{ secrets.OXYLABS_PASS }}
        run: |
          set -o pipefail
          mkdir -p output
          node src/monitor.js 2>&1 | tee output/monitor.log

      - name: "2/3 — Validate run"
        id: validate
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          set -o pipefail
          node src/validate_run.js 2>&1 | tee output/validate.log

      - name: "3/3 — Detector de cambios"
        if: steps.validate.outcome == 'success'
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          OXYLABS_USER:  ${{ secrets.OXYLABS_USER }}
          OXYLABS_PASS:  ${{ secrets.OXYLABS_PASS }}
        run: |
          set -o pipefail
          node src/detector_bajas.js 2>&1 | tee output/detector.log

      - name: Alerta run inválido — email
        if: steps.validate.outcome == 'failure'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_FROM:    ${{ secrets.NOTIFY_FROM }}
          NOTIFY_TO:      ${{ secrets.NOTIFY_TO }}
        run: |
          echo "⚠️  Run inválido — detector NO corrió. Enviando alerta..."
          node -e "
          const https = require('https');
          const body = JSON.stringify({
            from: process.env.NOTIFY_FROM || 'MLU Monitor <onboarding@resend.dev>',
            to:   [process.env.NOTIFY_TO  || 'undiaes@gmail.com'],
            subject: '⚠️ MLU Monitor — run inválido detectado',
            html: '<h2>Run inválido</h2><p>El scraping del run <code>${{ github.run_number }}</code> fue marcado inválido.</p><p>El detector de bajas NO corrió. Revisar los logs del workflow.</p><p><a href=\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\">Ver run en GitHub Actions</a></p>'
          });
          const req = https.request({
            hostname: 'api.resend.com', path: '/emails', method: 'POST',
            headers: { 'Authorization': 'Bearer ' + process.env.RESEND_API_KEY, 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) }
          }, res => { let d=''; res.on('data',c=>d+=c); res.on('end',()=>console.log('Alerta enviada HTTP', res.statusCode, d.slice(0,100))); });
          req.on('error', e => console.error('Error alerta:', e.message));
          req.write(body); req.end();
          " || echo "⚠️  Falló el envío de alerta (no crítico)"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-run-${{ github.run_number }}
          path: output/
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  # JOB B: EMAIL RESUMEN DEL DÍA (19:00 UY)
  # ════════════════════════════════════════════════════════════════════════════
  email:
    name: "Email resumen del día"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 22 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'email')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: "Enviar email con SUBIDAS y BAJADAS del día"
        env:
          SUPABASE_URL:   ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:   ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_FROM:    ${{ secrets.NOTIFY_FROM }}
          NOTIFY_TO:      ${{ secrets.NOTIFY_TO }}
          OXYLABS_USER:   ${{ secrets.OXYLABS_USER }}
          OXYLABS_PASS:   ${{ secrets.OXYLABS_PASS }}
        run: |
          set -o pipefail
          mkdir -p output
          node src/notify_email.js 2>&1 | tee output/notify.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-run-${{ github.run_number }}
          path: output/
          retention-days: 30
